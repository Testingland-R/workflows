on:
  workflow_call:
    inputs:
      python-version:
        description: 'Python version to use'
        required: true
        type: string
        default: '3.11'
      working-directory:
        description: 'Directory where the code is located'
        required: false
        type: string
        default: '.'
      test-command:
        description: 'Command to run the tests'
        required: false
        type: string
        default: 'pytest --maxfail=1'
      dependency-install-command:
        description: 'Command to install dependencies'
        required: false
        type: string
        default: 'pip install -r requirements.txt'
      coverage-artifact-name:
        description: 'Name of the coverage artifact to upload'
        required: false
        type: string
        default: 'coverage-report'

jobs:

  python-CI-Unit-Tests:
    name: Python CI - Unit Tests
    runs-on: Linux
    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ inputs.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          ${{ inputs.dependency-install-command }}
      - name: Run tests
        run: ${{ inputs.test-command }}
      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ inputs.coverage-artifact-name }}
          path: coverage.xml
          retention-days: 7
